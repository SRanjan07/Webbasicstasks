<!DOCTYPE html>
<html>
<head>
    <title>List Inside Table</title>
</head>
<body>

    <h2 style="text-align:center;">Student Course Details</h2>

    <table border="2px" style="width:80%; margin:auto; border-collapse:collapse;">
        
        <tr style="background-color:#d09090;">
            <th style="padding:10px;">Student Name</th>
            <th style="padding:10px;">Subjects Enrolled</th>
            <th style="padding:10px;">Activities</th>
        </tr>

        <tr>
            <td style="padding:10px; vertical-align:top;">Manas</td>
            
            <td style="padding:10px;">
                <ul style="margin:0; padding-left:20px;">
                    <li>Mathematics</li>
                    <li>Physics</li>
                    <li>Computer Science</li>
                </ul>
            </td>

            <td style="padding:10px;">
                <ol style="margin:0; padding-left:20px;">
                    <li>Coding Club</li>
                    <li>Robotics Workshop</li>
                    <li>Sports</li>
                </ol>
            </td>
        </tr>

        <tr>
            <td style="padding:10px; vertical-align:top;">Shubham</td>
            
            <td style="padding:10px;">
                <ul style="margin:0; padding-left:20px;">
                    <li>English</li>
                    <li>History</li>
                    <li>Geography</li>
                </ul>
            </td>

            <td style="padding:10px;">
                <ol style="margin:0; padding-left:20px;">
                    <li>Debate Club</li>
                    <li>Music</li>
                </ol>
            </td>
        </tr>

    </table>

</body>
</html>
